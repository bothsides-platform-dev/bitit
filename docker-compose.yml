services:
  pg:
    image: postgres:16-alpine
    container_name: bidit-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bidit
      POSTGRES_PASSWORD: bidit
      POSTGRES_DB: bidit
    volumes:
      - bidit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidit -d bidit"]
      interval: 5s
      timeout: 3s
      retries: 10

  pg-test:
    image: postgres:16-alpine
    container_name: bidit-pg-test
    profiles: ["test"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bidit
      POSTGRES_PASSWORD: bidit
      POSTGRES_DB: bidit_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidit -d bidit_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bidit_pgdata: {}
